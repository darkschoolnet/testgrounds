function escJs(s){return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function clearMsgs(){document.querySelectorAll('.msg').forEach(el=>{el.className='msg';el.textContent='';});}
function clearMsg(id){const el=document.getElementById(id);if(el){el.className='msg';el.textContent='';}}
function showMsg(id,text,type){const el=document.getElementById(id);if(!el)return;el.textContent=text;el.className='msg '+type;}
function hideMsg(id){clearMsg(id);}
function setBtnL(btnId,txtId,label,loading){document.getElementById(btnId).disabled=loading;document.getElementById(txtId).innerHTML=loading?`<span class="spin"></span>${label}`:label;}
function setSBtnL(btnId,txtId,label,loading){document.getElementById(btnId).disabled=loading;document.getElementById(txtId).innerHTML=loading?`<span class="spin"></span>${label}`:label;}


/* ══ IDEAS BOARD ══ */
const IDEAS_DEVICE_KEY='dsn_device_id';
const IDEAS_VOTED_KEY='dsn_voted_ideas';

let ideasCache=[];
let ideasAllCache=[];
let ideasActiveFilter={current:'all',all:'all'};
let ideasCdInterval=null;

function ideasGetOrCreateDeviceId(){
  let id=localStorage.getItem(IDEAS_DEVICE_KEY);
  if(!id){const b=new Uint8Array(16);crypto.getRandomValues(b);id=Array.from(b).map(x=>x.toString(16).padStart(2,'0')).join('');localStorage.setItem(IDEAS_DEVICE_KEY,id);}
  return id;
}
const ideasDeviceId=ideasGetOrCreateDeviceId();

function ideasGetVoted(){const v=localStorage.getItem(IDEAS_VOTED_KEY);return v?v.split(',').filter(Boolean):[];}
function ideasSaveVoted(arr){localStorage.setItem(IDEAS_VOTED_KEY,arr.join(','));}
function ideasHasVoted(id){return ideasGetVoted().includes(String(id));}

/* German week key (same logic as ideas board) */
function ideasGetGermanDate(){return new Date(new Date().toLocaleString('en-US',{timeZone:'Europe/Berlin'}));}
function ideasGetISOWeekKey(date){
  const d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));
  const day=d.getUTCDay()||7;d.setUTCDate(d.getUTCDate()+4-day);
  const y=new Date(Date.UTC(d.getUTCFullYear(),0,1));
  const wn=Math.ceil((((d-y)/86400000)+1)/7);
  return `${d.getUTCFullYear()}-W${String(wn).padStart(2,'0')}`;
}
function ideasGetActiveWeekKey(){
  const now=ideasGetGermanDate();
  const day=now.getDay(),h=now.getHours(),m=now.getMinutes();
  const past=(day===5&&(h>15||(h===15&&m>=45)))||day===6;
  if(past){const n=new Date(now);n.setDate(now.getDate()+(8-day)%7);return ideasGetISOWeekKey(n);}
  return ideasGetISOWeekKey(now);
}
function ideasGetNextFri(){
  const now=ideasGetGermanDate();
  const day=now.getDay(),h=now.getHours(),m=now.getMinutes();
  let d=(5-day+7)%7;
  if(day===5&&(h<15||(h===15&&m<45)))d=0;
  else if(d===0)d=7;
  const t=new Date(now);t.setDate(now.getDate()+d);t.setHours(15,45,0,0);
  return t-now;
}
function ideasFmtCd(ms){
  if(ms<=0)return'00:00:00';
  const ts=Math.floor(ms/1000),d=Math.floor(ts/86400),h=Math.floor((ts%86400)/3600),mi=Math.floor((ts%3600)/60),s=ts%60;
  if(d>0)return`${d}T ${String(h).padStart(2,'0')}:${String(mi).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return`${String(h).padStart(2,'0')}:${String(mi).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function ideasStartCountdown(){
  if(ideasCdInterval)clearInterval(ideasCdInterval);
  const tick=()=>{
    const ms=ideasGetNextFri();
    const el=document.getElementById('ideasCdTimer');
    if(el)el.textContent=ideasFmtCd(ms);
  };
  tick();ideasCdInterval=setInterval(tick,1000);
  const wk=document.getElementById('ideasCdWeek');
  if(wk)wk.textContent=ideasGetActiveWeekKey();
  const badge=document.getElementById('ideasWeekBadge');
  if(badge)badge.textContent=ideasGetActiveWeekKey();
}

/* TABS */
function switchIdeasTab(name){
  ['current','all','hof'].forEach(t=>{
    document.getElementById('itab-'+t).classList.toggle('active',t===name);
    document.getElementById('ipanel-'+t).classList.toggle('active',t===name);
  });
  if(name==='all')loadIdeasAll();
  if(name==='hof')loadIdeasHof();
}

function setIdeasFilter(el,tab,val){
  el.closest('.ideas-filters').querySelectorAll('.ideas-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  ideasActiveFilter[tab]=val;
  if(tab==='current')renderIdeasCurrent();
  if(tab==='all')renderIdeasAll();
}

function toggleIdeasGuest(blockId){
  const body=document.getElementById(blockId+'Body');
  const arrow=document.getElementById(blockId+'Arrow');
  const isOpen=body.classList.contains('open');
  body.classList.toggle('open',!isOpen);
  if(arrow)arrow.classList.toggle('open',!isOpen);
}

/* LOAD DATA */
async function loadIdeasCurrent(){
  const weekKey=ideasGetActiveWeekKey();
  const grid=document.getElementById('ideasGridCurrent');
  try{
    const{data,error}=await db.from('dsn_game_ideas').select('*').eq('week_key',weekKey).order('created_at',{ascending:false});
    if(error){
      grid.innerHTML='<div class="ideas-empty" style="grid-column:1/-1"><div class="ideas-empty-icon">⚠️</div><div class="ideas-empty-title">Tabellen fehlen</div><div class="ideas-empty-sub">SQL-Setup in Supabase ausführen — siehe HTML-Kommentar am Ende der Datei.</div></div>';
      document.getElementById('ideasStatCount').textContent='–';
      document.getElementById('ideasStatVotes').textContent='–';
      document.getElementById('ideasStatWinners').textContent='–';
      console.error('Ideas DB error:',error);return;
    }
    const ids=(data||[]).map(i=>i.id);
    let vc={};
    if(ids.length){
      const{data:vd}=await db.from('dsn_idea_votes').select('idea_id').in('idea_id',ids);
      (vd||[]).forEach(v=>{vc[v.idea_id]=(vc[v.idea_id]||0)+1;});
    }
    ideasCache=(data||[]).map(i=>({...i,vote_count:vc[i.id]||0}));
    renderIdeasCurrent();
    updateIdeasStats(ideasCache);
  }catch(e){
    grid.innerHTML='<div class="ideas-empty" style="grid-column:1/-1"><div class="ideas-empty-icon">⚠️</div><div class="ideas-empty-title">Verbindungsfehler</div><div class="ideas-empty-sub">'+(e.message||'Unbekannter Fehler')+'</div></div>';
    console.error(e);
  }
}

async function loadIdeasAll(){
  document.getElementById('ideasGridAll').innerHTML='<div class="ideas-empty"><div style="font-family:var(--fu);font-size:11px;letter-spacing:2px;color:var(--text-muted);">LÄDT…</div></div>';
  const{data}=await db.from('dsn_game_ideas').select('*').order('created_at',{ascending:false});
  const ids=(data||[]).map(i=>i.id);
  let vc={};
  if(ids.length){const{data:vd}=await db.from('dsn_idea_votes').select('idea_id').in('idea_id',ids);(vd||[]).forEach(v=>{vc[v.idea_id]=(vc[v.idea_id]||0)+1;});}
  ideasAllCache=(data||[]).map(i=>({...i,vote_count:vc[i.id]||0}));
  renderIdeasAll();
}

async function loadIdeasHof(){
  document.getElementById('ideasHofList').innerHTML='<div class="ideas-empty"><div style="font-family:var(--fu);font-size:11px;letter-spacing:2px;color:var(--text-muted);">LÄDT…</div></div>';
  const{data}=await db.from('dsn_game_ideas').select('*').eq('is_winner',true).order('winner_votes',{ascending:false});
  const winners=data||[];
  const el=document.getElementById('ideasHofList');
  if(!winners.length){
    el.innerHTML='<div class="ideas-empty"><div class="ideas-empty-icon">🏆</div><div class="ideas-empty-title">Noch keine Gewinner</div><div class="ideas-empty-sub">Jeden Freitag um 15:45 Uhr wird die meistgevotete Idee gekrönt</div></div>';
    return;
  }
  el.innerHTML='';
  const list=document.createElement('div');list.className='ideas-hof-list';
  winners.forEach((w,i)=>{
    const rk=i===0?'r1':i===1?'r2':i===2?'r3':'';
    const item=document.createElement('div');item.className='ideas-hof-item';item.style.animationDelay=`${i*.05}s`;
    item.innerHTML=`<div class="ideas-hof-rank ${rk}">${i+1}</div><div class="ideas-hof-info"><div class="ideas-hof-title">${escHtml(w.title)}</div><div class="ideas-hof-meta">${escHtml(w.submitted_by_username)} · ${escHtml(w.category||'—')}</div></div><div><div class="ideas-hof-week">${escHtml(w.week_key||'—')}</div></div><div class="ideas-hof-votes">▲ ${w.winner_votes||0}</div>`;
    list.appendChild(item);
  });
  el.appendChild(list);
  document.getElementById('ideasStatWinners').textContent=winners.length;
}

/* RENDER */
function renderIdeasCurrent(){
  let ideas=[...ideasCache];
  const f=ideasActiveFilter.current;
  if(f!=='all')ideas=ideas.filter(i=>i.category===f);
  ideas.sort((a,b)=>b.vote_count-a.vote_count);
  renderIdeasToGrid('ideasGridCurrent',ideas);
}

function renderIdeasAll(){
  let ideas=[...ideasAllCache];
  const f=ideasActiveFilter.all;
  if(f!=='all')ideas=ideas.filter(i=>i.status===f);
  ideas.sort((a,b)=>b.vote_count-a.vote_count);
  renderIdeasToGrid('ideasGridAll',ideas);
}

function renderIdeasToGrid(gridId,ideas){
  const grid=document.getElementById(gridId);
  if(!ideas||!ideas.length){
    grid.innerHTML=`<div class="ideas-empty"><div class="ideas-empty-icon">💡</div><div class="ideas-empty-title">Keine Ideen</div><div class="ideas-empty-sub">${currentUser?'Reiche als Erster eine Idee ein!':'Melde dich an und reiche eine Idee ein!'}</div></div>`;
    return;
  }
  grid.innerHTML='';
  ideas.forEach((idea,idx)=>{
    const voted=ideasHasVoted(idea.id);
    const isWin=idea.is_winner;
    const card=document.createElement('div');
    card.className=`idea-card${isWin?' winner-card':''}`;
    card.style.animationDelay=`${idx*.04}s`;
    const voteDisabled=!currentUser?'disabled':'';
    const voteTitle=!currentUser?'title="Einloggen zum Voten"':'';
    const sc=ideasStatusClass(idea.status),sl=ideasStatusLabel(idea.status);
    card.innerHTML=`
      ${isWin?'<div class="idea-winner-badge">🏆 WOCHENGEWINNER</div>':''}
      <div class="idea-meta"><span class="idea-author">von ${escHtml(idea.submitted_by_username)}</span><span class="idea-cat">${escHtml(idea.category||'misc')}</span></div>
      <div class="idea-title">${escHtml(idea.title)}</div>
      <div class="idea-desc">${escHtml(idea.description)}</div>
      <div class="idea-footer">
        <span class="idea-status ${sc}">${sl}</span>
        <div class="idea-vote-area">
          <span class="idea-vote-count">${idea.vote_count||0}</span>
          <button class="btn-idea-vote${voted?' voted':''}" onclick="ideaVote('${idea.id}')" ${voted?'disabled':voteDisabled} ${voteTitle}>
            <span>▲ ${voted?'VOTED':'VOTE'}</span>
          </button>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

/* SUBMIT */
async function submitIdeaBoard(){
  if(!currentUser)return;
  const title=document.getElementById('ideaTitleInput').value.trim();
  const desc=document.getElementById('ideaDescInput').value.trim();
  const cat=document.getElementById('ideaCatSelect').value;
  const msgEl=document.getElementById('ideaSubmitMsg');
  msgEl.style.display='none';
  if(!title||!desc){msgEl.style.cssText='display:block;color:var(--danger);font-family:var(--fu);font-size:12px;letter-spacing:1px;margin-top:8px;';msgEl.textContent='Bitte Titel und Beschreibung ausfüllen.';return;}
  const btn=document.getElementById('ideaSubmitBtn');
  btn.disabled=true;btn.querySelector('span').innerHTML='<span class="spin"></span>EINREICHEN…';
  const{error}=await db.from('dsn_game_ideas').insert({title,description:desc,category:cat,submitted_by_username:currentUser.username,status:'vorgeschlagen',week_key:ideasGetActiveWeekKey(),is_winner:false});
  btn.disabled=false;btn.querySelector('span').textContent='▶ IDEE EINREICHEN';
  if(error){msgEl.style.cssText='display:block;color:var(--danger);font-family:var(--fu);font-size:12px;letter-spacing:1px;margin-top:8px;';msgEl.textContent='Fehler: '+error.message;return;}
  document.getElementById('ideaTitleInput').value='';
  document.getElementById('ideaDescInput').value='';
  msgEl.style.cssText='display:block;color:var(--success);font-family:var(--fu);font-size:12px;letter-spacing:1px;margin-top:8px;';
  msgEl.textContent='✓ Idee eingereicht!';
  setTimeout(()=>{msgEl.style.display='none';},3000);
  loadIdeasCurrent();
}

/* VOTE */
async function ideaVote(ideaId){
  if(!currentUser){openAccountDrawer('login');return;}
  if(ideasHasVoted(ideaId))return;
  const{error}=await db.from('dsn_idea_votes').insert({idea_id:ideaId,device_id:ideasDeviceId});
  if(error){
    if(error.code==='23505'){const v=ideasGetVoted();v.push(ideaId);ideasSaveVoted(v);}
    return;
  }
  const v=ideasGetVoted();v.push(ideaId);ideasSaveVoted(v);
  const c=ideasCache.find(i=>i.id===ideaId);if(c)c.vote_count=(c.vote_count||0)+1;
  const ca=ideasAllCache.find(i=>i.id===ideaId);if(ca)ca.vote_count=(ca.vote_count||0)+1;
  renderIdeasCurrent();
}

/* STATS */
async function updateIdeasStats(ideas){
  document.getElementById('ideasStatCount').textContent=ideas.length;
  document.getElementById('ideasStatVotes').textContent=ideas.reduce((s,i)=>s+(i.vote_count||0),0);
  const{count}=await db.from('dsn_game_ideas').select('id',{count:'exact',head:true}).eq('is_winner',true);
  document.getElementById('ideasStatWinners').textContent=count||0;
}

function ideasStatusClass(s){const m={vorgeschlagen:'s-vorgeschlagen',abgelehnt:'s-abgelehnt',in_arbeit:'s-in_arbeit',umgesetzt:'s-umgesetzt'};return m[s]||'s-vorgeschlagen';}
function ideasStatusLabel(s){const m={vorgeschlagen:'Vorgeschlagen',abgelehnt:'Abgelehnt',in_arbeit:'In Arbeit',umgesetzt:'Umgesetzt',gewinner:'Gewinner'};return m[s]||s;}

/* INIT — wird in applyLoggedIn / applyLoggedOut aufgerufen */
function initIdeasBoard(){
  ideasStartCountdown();
  if(currentUser){
    document.getElementById('ideasDirectSubmit').style.display='block';
    document.getElementById('ideasGuestSubmit').style.display='none';
    // Promo-Banner für eingeloggte: nur Stats + Willkommen zeigen, kein Login-CTA
    document.getElementById('ideasPromoActions').style.display='none';
  }else{
    document.getElementById('ideasDirectSubmit').style.display='none';
    document.getElementById('ideasGuestSubmit').style.display='block';
    document.getElementById('ideasPromoActions').style.display='flex';
  }
  loadIdeasCurrent();
