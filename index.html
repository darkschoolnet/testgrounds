<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOUND Chat</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root {
            --bg: #0b141a;
            --side-panel: #111b21;
            --chat-bg: #0b141a;
            --accent: #00a884; /* WhatsApp Green */
            --text: #e9edef;
            --subtle: #8696a0;
            --my-bubble: #005c4b;
            --other-bubble: #202c33;
            --input-bg: #2a3942;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Helvetica, Arial, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        /* Login Screen */
        #login-screen { 
            position: fixed; inset: 0; background: var(--bg); z-index: 1000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        .login-box { background: var(--side-panel); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #334155; }

        /* Main Layout */
        .sidebar { width: 30%; min-width: 300px; background: var(--side-panel); border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; }
        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--chat-bg); position: relative; }

        /* Search & Header */
        .header { padding: 15px; background: var(--side-panel); display: flex; justify-content: space-between; align-items: center; }
        .search-bar { padding: 10px; background: var(--side-panel); }
        input { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--input-bg); color: white; font-size: 16px; }
        button { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* User List */
        .user-list { flex: 1; overflow-y: auto; }
        .user-item { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.2s; }
        .user-item:hover { background: rgba(255,255,255,0.05); }
        .user-item .name { font-weight: bold; display: block; }
        .user-item .code { font-size: 12px; color: var(--subtle); }

        /* Chat Window */
        .chat-header { padding: 15px; background: var(--side-panel); border-bottom: 1px solid rgba(255,255,255,0.1); font-weight: bold; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 70%; padding: 8px 12px; border-radius: 12px; font-size: 15px; position: relative; }
        .msg.me { align-self: flex-end; background: var(--my-bubble); border-bottom-right-radius: 2px; }
        .msg.other { align-self: flex-start; background: var(--other-bubble); border-bottom-left-radius: 2px; }
        .msg-time { font-size: 10px; color: rgba(255,255,255,0.5); display: block; text-align: right; margin-top: 4px; }

        .input-area { padding: 15px; background: var(--side-panel); display: flex; gap: 10px; }
        
        .hidden { display: none !important; }
        .version-tag { position: absolute; bottom: 5px; right: 10px; font-size: 10px; color: var(--subtle); opacity: 0.5; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="margin-bottom: 20px; color: var(--accent);">BOUND Messenger</h2>
            <input type="text" id="regName" placeholder="Dein Name" style="margin-bottom: 10px;">
            <input type="text" id="regCode" placeholder="3-stelliger Code (z.B. 123)" maxlength="3" style="margin-bottom: 20px;">
            <button onclick="register()" style="width: 100%;">JETZT STARTEN</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="header">
            <h3 id="myDisplayName">Messenger</h3>
            <button onclick="logout()" style="padding: 5px 10px; font-size: 12px; background: var(--other-bubble)">Logout</button>
        </div>
        <div class="search-bar">
            <input type="text" id="userSearch" placeholder="Nutzer suchen..." oninput="searchUsers()">
        </div>
        <div class="user-list" id="contactsList">
            </div>
    </div>

    <div class="chat-area">
        <div id="chat-placeholder" style="flex: 1; display: flex; align-items: center; justify-content: center; color: var(--subtle);">
            Wähle einen Kontakt aus, um zu chatten.
        </div>
        <div id="active-chat" class="hidden" style="height: 100%; display: flex; flex-direction: column;">
            <div class="chat-header" id="chatWithTitle">Name</div>
            <div id="messages"></div>
            <div class="input-area">
                <input type="text" id="msgInput" placeholder="Nachricht schreiben..." onkeypress="if(event.key==='Enter') sendMsg()">
                <button onclick="sendMsg()">➤</button>
            </div>
        </div>
        <div class="version-tag">Beta V1.2</div>
    </div>

    <script>
        // DEINE FIREBASE CONFIG (Gleiche wie oben nutzen)
        const firebaseConfig = {
            apiKey: "AIzaSyCrFeaJLo7LS6hHml8yu8Fh7Z4mklh38uw",
            authDomain: "boundonline-538df.firebaseapp.com",
            databaseURL: "https://boundonline-538df-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "boundonline-538df",
            storageBucket: "boundonline-538df.firebasestorage.app",
            messagingSenderId: "144308798711",
            appId: "1:144308798711:web:ef6f0d619896e533f57ff2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = JSON.parse(localStorage.getItem('boundUser')) || null;
        let activeChatId = null;

        if(currentUser) showMain();

        function register() {
            const name = document.getElementById('regName').value.trim();
            const code = document.getElementById('regCode').value.trim();
            if(name.length < 2 || code.length !== 3) return alert("Name min. 2 Zeichen, Code genau 3!");
            
            const userId = `${name}_${code}`;
            currentUser = { id: userId, name: name, code: code };
            
            db.ref('users/' + userId).set(currentUser).then(() => {
                localStorage.setItem('boundUser', JSON.stringify(currentUser));
                showMain();
            });
        }

        function showMain() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('myDisplayName').innerText = currentUser.name;
            loadContacts();
        }

        function loadContacts() {
            db.ref('users').on('value', s => {
                const users = s.val();
                const list = document.getElementById('contactsList');
                list.innerHTML = "";
                for(let id in users) {
                    if(id === currentUser.id) continue;
                    list.innerHTML += `
                        <div class="user-item" onclick="openChat('${id}', '${users[id].name}')">
                            <span class="name">${users[id].name}</span>
                            <span class="code">ID: #${users[id].code}</span>
                        </div>`;
                }
            });
        }

        function searchUsers() {
            const term = document.getElementById('userSearch').value.toLowerCase();
            const items = document.querySelectorAll('.user-item');
            items.forEach(item => {
                item.classList.toggle('hidden', !item.innerText.toLowerCase().includes(term));
            });
        }

        function openChat(otherId, otherName) {
            document.getElementById('chat-placeholder').classList.add('hidden');
            document.getElementById('active-chat').classList.remove('hidden');
            document.getElementById('chatWithTitle').innerText = otherName;
            
            // Generiere eindeutige Chat-ID (alphabetisch sortiert damit beide die gleiche ID haben)
            activeChatId = [currentUser.id, otherId].sort().join("--");
            
            loadMessages();
        }

        function loadMessages() {
            db.ref('chats/' + activeChatId).on('value', s => {
                const msgs = s.val();
                const container = document.getElementById('messages');
                container.innerHTML = "";
                if(msgs) {
                    for(let id in msgs) {
                        const m = msgs[id];
                        const time = new Date(m.ts).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                        container.innerHTML += `
                            <div class="msg ${m.sender === currentUser.id ? 'me' : 'other'}">
                                ${m.text}
                                <span class="msg-time">${time}</span>
                            </div>`;
                    }
                }
                container.scrollTop = container.scrollHeight;
            });
        }

        function sendMsg() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if(!text || !activeChatId) return;

            db.ref('chats/' + activeChatId).push({
                sender: currentUser.id,
                text: text,
                ts: Date.now()
            });
            input.value = "";
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
